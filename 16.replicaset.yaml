apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx
  # these labels are replica set
  labels:
    project: roboshop
    purpose: rs-demo
    tier: frontend
    component: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      project: roboshop
      purpose: rs-demo
      tier: frontend
      component: frontend
# this is pod definition , pod is subset of replicaset
  template:
    metadata:
      labels:
        project: roboshop
        purpose: rs-demo
        tier: frontend
        component: frontend

    spec: 
      containers:
      - name: nginx
        image: nginx

